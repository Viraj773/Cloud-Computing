<!DOCTYPE html>
<html>
<head>
    <title>Main Page</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f2f2f2; }
        .container { width: 800px; margin: 30px auto; background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; }
        input { padding: 8px; margin-top: 4px; width: 100%; box-sizing: border-box; }
        button { padding: 10px 20px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #45a049; }
        .remove-btn { background-color: #f44336; }
        .remove-btn:hover { background-color: #d32f2f; }
        .error { color: red; }
        .song-card { border: 1px solid #ddd; padding: 10px; margin: 10px 0; border-radius: 4px; display: flex; align-items: center; gap: 15px; }
        .song-card img { width: 80px; height: 80px; object-fit: cover; }
        a { color: #4CAF50; float: right; }
        hr { margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <h2>Welcome, <span id="username"></span>!</h2>
            <a href="login.html" onclick="logout()">Logout</a>
        </div>
        <hr>
        <h3>Your Subscriptions</h3>
        <div id="subscriptions"><p>Loading...</p></div>
        <hr>
        <h3>Search Songs</h3>
        <label>Title:</label><input type="text" id="qTitle"><br><br>
        <label>Artist:</label><input type="text" id="qArtist"><br><br>
        <label>Year:</label><input type="text" id="qYear"><br><br>
        <label>Album:</label><input type="text" id="qAlbum"><br><br>
        <button onclick="doQuery()">Query</button>
        <p class="error" id="queryMsg"></p>
        <div id="queryResults"></div>
    </div>
    <script>
            const API = 'https://9xba9bdes3.execute-api.us-east-1.amazonaws.com/prod';

            const email = sessionStorage.getItem('email');
            const username = sessionStorage.getItem('username');

            if (!email) {
                window.location.href = 'login.html';
            }

            document.getElementById('username').textContent = username || email;

            function escapeHtml(value) {
                return String(value ?? '')
                    .replaceAll('&', '&amp;')
                    .replaceAll('<', '&lt;')
                    .replaceAll('>', '&gt;')
                    .replaceAll('"', '&quot;')
                    .replaceAll("'", '&#039;');
            }

            function songCard(song, mode) {
                const encodedSong = encodeURIComponent(JSON.stringify(song));

                const img = song.presigned_url
                    ? `<img src="${escapeHtml(song.presigned_url)}" onerror="this.style.display='none'">`
                    : '';

                const btn = mode === 'subscribe'
                    ? `<button onclick="subscribeSong('${encodedSong}')">Subscribe</button>`
                    : `<button class="remove-btn" onclick="removeSong('${escapeHtml(song.song_id)}')">Remove</button>`;

                return `
                    <div class="song-card">
                        ${img}
                        <div>
                            <strong>${escapeHtml(song.title)}</strong><br>
                            Artist: ${escapeHtml(song.artist)}<br>
                            Year: ${escapeHtml(song.year)}<br>
                            Album: ${escapeHtml(song.album)}
                        </div>
                        ${btn}
                    </div>
                `;
            }

            async function loadSubscriptions() {
                try {
                    const res = await fetch(`${API}/subscriptions`, {
                        method: 'GET',
                        headers: {
                            'X-User-Email': email
                        }
                    });

                    const data = await res.json();
                    const subs = data.subscriptions || [];
                    const el = document.getElementById('subscriptions');

                    el.innerHTML = subs.length
                        ? subs.map(s => songCard(s, 'remove')).join('')
                        : '<p>You have no subscriptions yet.</p>';

                } catch (e) {
                    console.error('Load subscriptions failed:', e);
                    document.getElementById('subscriptions').innerHTML = '<p>Failed to load subscriptions.</p>';
                }
            }

            async function subscribeSong(encodedSong) {
                const song = JSON.parse(decodeURIComponent(encodedSong));

                try {
                    const res = await fetch(`${API}/subscriptions`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-User-Email': email
                        },
                        body: JSON.stringify(song)
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        alert(data.error || 'Failed to subscribe.');
                        return;
                    }

                    await loadSubscriptions();

                } catch (e) {
                    console.error('Subscribe failed:', e);
                    alert('Subscribe failed. Check console for details.');
                }
            }

            async function removeSong(song_id) {
                try {
                    const res = await fetch(`${API}/subscriptions`, {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-User-Email': email
                        },
                        body: JSON.stringify({ song_id })
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        alert(data.error || 'Failed to remove subscription.');
                        return;
                    }

                    await loadSubscriptions();

                } catch (e) {
                    console.error('Remove failed:', e);
                    alert('Remove failed. Check console for details.');
                }
            }

            async function doQuery() {
                const title = document.getElementById('qTitle').value.trim();
                const artist = document.getElementById('qArtist').value.trim();
                const year = document.getElementById('qYear').value.trim();
                const album = document.getElementById('qAlbum').value.trim();

                document.getElementById('queryMsg').textContent = '';
                document.getElementById('queryResults').innerHTML = '';

                if (!title && !artist && !year && !album) {
                    document.getElementById('queryMsg').textContent = 'Please enter at least one search field.';
                    return;
                }

                try {
                    const qs = new URLSearchParams();

                    if (title) qs.append('title', title);
                    if (artist) qs.append('artist', artist);
                    if (year) qs.append('year', year);
                    if (album) qs.append('album', album);

                    const res = await fetch(`${API}/query?${qs.toString()}`);
                    const data = await res.json();

                    const songs = data.songs || data.results || [];

                    if (!songs.length) {
                        document.getElementById('queryMsg').textContent = data.error || 'No result is retrieved. Please query again';
                    } else {
                        document.getElementById('queryResults').innerHTML = songs.map(s => songCard(s, 'subscribe')).join('');
                    }

                } catch (e) {
                    console.error('Query failed:', e);
                    document.getElementById('queryMsg').textContent = 'Query failed. Check console for details.';
                }
            }

            function logout() {
                sessionStorage.clear();
            }

            loadSubscriptions();
        </script>
</body>
</html>
